<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nova Scrims Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page">
    <section class="overlay"></section>
    <section class="dialog" role="dialog" aria-labelledby="createLobbyTitle">
      <header class="dialog-header">
        <h1 id="createLobbyTitle">Create Lobby</h1>
        <p class="dialog-subtitle">Manage your scrims workflow from one place.</p>
        <nav class="quick-actions" aria-label="Quick actions">
          <a class="quick-link quick-link-primary" href="/dropmap.html">Fortnite Dropmap</a>
          <a class="quick-link" href="/auth/discord">Discord Login</a>
          <a class="quick-link" href="https://discord.gg/SGg8dMpq55" target="_blank" rel="noopener noreferrer">Discord Server</a>
        </nav>
      </header>

      <form id="createLobbyForm" class="dialog-form">
        <div class="row two-cols">
          <label>
            <span>Session</span>
            <input id="session" name="session" type="number" min="1" value="1" required />
          </label>
          <label>
            <span>Lobby</span>
            <input id="lobby" name="lobby" type="number" min="1" value="1" required />
          </label>
        </div>

        <label>
          <span>Registration Opens</span>
          <input id="registrationOpens" name="registrationOpens" type="time" value="00:48" required />
        </label>

        <label>
          <span>Lobby Template</span>
          <select id="lobbyTemplate" name="lobbyTemplate" required>
            <option value="" disabled>Select a lobby template...</option>
            <option value="duo-default" selected>Duo Default</option>
            <option value="duo-ranked">Duo Ranked</option>
            <option value="duo-custom">Duo Custom</option>
            <option value="trio-default">Trio Default</option>
            <option value="trio-ranked">Trio Ranked</option>
            <option value="trio-custom">Trio Custom</option>
          </select>
        </label>

        <section class="priority" aria-live="polite">
          <h2>Priority Times (fixed)</h2>
          <ul>
            <li><strong>Supporter:</strong> <span id="supporterTime">--:--</span> <em>(+1 min)</em></li>
            <li><strong>Server Booster + CC Priority:</strong> <span id="boosterTime">--:--</span> <em>(+2 min)</em></li>
            <li><strong>Verified:</strong> <span id="verifiedTime">--:--</span> <em>(+3 min)</em></li>
          </ul>
        </section>

        <footer class="dialog-actions">
          <button type="button" class="btn btn-ghost" id="cancelBtn">Cancel</button>
          <button type="submit" class="btn btn-primary">Create Lobby</button>
        </footer>
      </form>

      <section id="result" class="result" hidden>
        <h3>Lobby Created</h3>
        <p id="resultText"></p>
      </section>
    </section>
  </main>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
